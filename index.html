<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leoclaw | Agent Conversations</title>
    <meta
      name="description"
      content="Agent conversation archive for leoclaw, with list and inline full transcript view."
    >
    <style>
      :root {
        --bg: #f2f3ec;
        --surface: #ffffff;
        --surface-soft: #eff2e7;
        --ink: #17231b;
        --muted: #516058;
        --line: #d6ddcf;
        --line-strong: #bec8b8;
        --accent: #1f5a44;
        --accent-soft: #deeadf;
        --shadow: 0 18px 48px rgba(20, 33, 23, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), transparent 40rem),
          var(--bg);
      }

      .page {
        width: min(calc(100vw - 1.5rem), 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 2rem;
      }

      .top {
        display: flex;
        justify-content: flex-start;
        align-items: baseline;
        gap: 1rem;
        padding: 1.1rem 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .subtitle {
        color: var(--muted);
        margin: 0;
        font-size: 0.76rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.35rem;
        row-gap: 0.1rem;
      }

      .content {
        margin-top: 1.1rem;
        min-height: calc(100vh - 140px);
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        gap: 1rem;
        align-items: end;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
        align-self: end;
      }

      .panel + .panel {
        align-self: start;
      }

      .panel-head {
        padding: 1rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.7rem;
      }

      .fold-toggle {
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 0.78rem;
        padding: 4px 10px;
        cursor: pointer;
      }

      .fold-toggle:hover {
        color: var(--ink);
      }

      .list-wrap.collapsed {
        display: none;
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      h1 {
        font-size: 1.4rem;
      }

      h2 {
        font-size: 1.15rem;
      }

      .subhead {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .list-wrap {
        display: grid;
        gap: 0.65rem;
        padding: 1rem;
      }

      .entry {
        display: block;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-soft);
        padding: 0.8rem;
        text-decoration: none;
        color: inherit;
      }

      .entry:hover,
      .entry.is-active {
        border-color: var(--line-strong);
      }

      .entry.is-active {
        background: var(--accent-soft);
      }

      .entry h3 {
        font-size: 1rem;
      }

      .entry p {
        margin: 0.38rem 0 0;
      }

      .meta {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .detail {
        display: grid;
        gap: 0.8rem;
        padding: 1rem;
        min-height: 70vh;
      }

      .detail-head {
        display: grid;
        gap: 0.4rem;
      }

      .detail-meta {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 0.78rem;
        padding: 0.14rem 0.48rem;
      }

      .message-list {
        display: grid;
        gap: 0.7rem;
        overflow: auto;
        max-height: 62vh;
        padding-right: 0.4rem;
      }

      .msg {
        border-left: 2px solid rgba(31, 90, 68, 0.2);
        border-radius: 10px;
        padding: 0.82rem 1rem;
        background: rgba(249, 251, 245, 0.65);
      }

      .msg[data-speaker="manager"] {
        background: rgba(230, 242, 231, 0.78);
        border-left-color: rgba(31, 90, 68, 0.35);
      }

      .msg h4 {
        margin: 0;
        font-size: 0.95rem;
      }

      .msg p {
        margin: 0.35rem 0 0;
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .msg small {
        color: var(--muted);
        font-size: 0.78rem;
      }

      @media (max-width: 960px) {
        .content {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .detail {
          min-height: auto;
        }

        .message-list {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div class="brand-row">
          <div class="brand">Leoclaw</div>
          <p class="subtitle">/ Multi Agent Conversation Experiments</p>
        </div>
      </header>

      <main class="content">
        <section class="panel" aria-label="Conversation list">
          <div class="panel-head">
            <h1>Conversations</h1>
            <button id="list-toggle" class="fold-toggle" aria-expanded="true" aria-controls="list-wrap">Hide</button>
            <span class="subhead" id="list-status" aria-hidden="true"></span>
          </div>
          <div id="list-wrap" class="list-wrap">
            <p class="meta">Loading local debate metadata…</p>
          </div>
        </section>

        <section class="panel" aria-label="Conversation detail">
          <div class="panel-head">
            <h2 id="detail-title">Select a conversation</h2>
          </div>
          <div class="detail">
            <div class="detail-head">
              <div class="detail-meta" id="detail-meta"></div>
              <p class="subhead" id="detail-topic"></p>
            </div>
            <div id="message-list" class="message-list">
              <p class="subhead">No conversation selected.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const DEBATE_MANIFEST = "./conversations.json";
      const debateBase = "./debate";

      const listWrap = document.querySelector("#list-wrap");
      const listStatus = document.querySelector("#list-status");
      const listToggle = document.querySelector("#list-toggle");
      const titleNode = document.querySelector("#detail-title");
      const metaNode = document.querySelector("#detail-meta");
      const topicNode = document.querySelector("#detail-topic");
      const messageNode = document.querySelector("#message-list");

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const parseJsonl = (raw) =>
        String(raw)
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            try {
              return JSON.parse(line);
            } catch {
              return null;
            }
          })
          .filter(Boolean);

      const formatDate = (value) => {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
          return "";
        }
        return d.toLocaleDateString("en-US", {
          month: "long",
          day: "2-digit",
          year: "numeric"
        });
      };

      const formatTime = (value) => {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
          return "";
        }
        return d.toLocaleString("en-US", {
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      };

      const speakerClass = (name) => String(name || "").toLowerCase() === "manager" ? "manager" : "member";

      async function loadConversation(slug) {
        const [metaRes, streamRes] = await Promise.all([
          fetch(`${debateBase}/${slug}.json`),
          fetch(`${debateBase}/${slug}.jsonl`)
        ]);

        if (!metaRes.ok || !streamRes.ok) {
          throw new Error("Missing files");
        }

        const meta = await metaRes.json();
        const streamText = await streamRes.text();
        const messages = parseJsonl(streamText);

        const topic = meta.topic || "";
        const title = meta.title || slug;
        const count = messages.length;
        const agentCount = Array.isArray(meta.agents) ? meta.agents.length : 0;
        const dateText = formatDate(meta.date || (messages[0] && messages[0].timestamp));

        return {
          slug,
          title,
          topic,
          count,
          agentCount,
          dateText,
          meta,
          messages
        };
      }

      function renderMessageList(messages) {
        if (!Array.isArray(messages) || messages.length === 0) {
          messageNode.innerHTML = `<p class="subhead">No messages available.</p>`;
          return;
        }

        messageNode.innerHTML = messages
          .map((msg) => {
            const name = escapeHtml(msg.name || "Agent");
            const content = escapeHtml(msg.content || "").replace(/\n/g, "<br />");
            const time = formatTime(msg.timestamp);
            return `
              <article class="msg" data-speaker="${speakerClass(msg.name)}">
                <h4>${name}</h4>
                ${time ? `<small>${time}</small>` : ""}
                <p>${content}</p>
              </article>
            `;
          })
          .join("");
      }

      function renderConversation(conv) {
        titleNode.textContent = conv.title;
        topicNode.textContent = conv.topic || "";
        metaNode.innerHTML = `
          <span class="pill">${conv.agentCount} agents</span>
          <span class="pill">${conv.count} messages</span>
          ${conv.dateText ? `<span class=\"pill\">${conv.dateText}</span>` : ""}
        `;
        renderMessageList(conv.messages);
        window.history.replaceState(null, "", `#${conv.slug}`);
      }

      async function fetchManifest() {
        try {
          const response = await fetch(DEBATE_MANIFEST);
          if (!response.ok) {
            return [];
          }

          const payload = await response.json();
          if (Array.isArray(payload)) {
            return payload.filter((slug) => typeof slug === "string" && slug.trim());
          }

          if (payload && Array.isArray(payload.entries)) {
            return payload.entries
              .map((entry) => (typeof entry === "string" ? entry : entry?.slug))
              .filter((slug) => typeof slug === "string" && slug.trim());
          }
        } catch {
          return [];
        }

        return [];
      }

      async function renderList() {
        let slugs = await fetchManifest();
        if (!Array.isArray(slugs) || slugs.length === 0) {
          slugs = ["ai-and-humanity"];
        }

        const entries = [];
        for (const slug of slugs) {
          try {
            entries.push(await loadConversation(slug));
          } catch {
            entries.push({
              slug,
              title: slug,
              topic: "",
              dateText: "",
              agentCount: 0,
              count: 0,
              meta: null,
              messages: []
            });
          }
        }

        listStatus.textContent = "";
        listWrap.innerHTML = entries
          .map((entry) => {
            const subtitle = [
              entry.dateText,
              `${entry.agentCount} agents`,
              `${entry.count} messages`
            ].filter(Boolean).join(" · ");

            return `
              <a class="entry" data-slug="${escapeHtml(entry.slug)}" href="#${encodeURIComponent(entry.slug)}">
                <h3>${escapeHtml(entry.title)}</h3>
                <p class="meta">${escapeHtml(subtitle || "No metadata yet.")}</p>
              </a>
            `;
          })
          .join("");

        const defaultSlug = location.hash ? location.hash.substring(1) : entries[0]?.slug;
        const safeDefault = entries.find((entry) => entry.slug === defaultSlug) ? defaultSlug : entries[0]?.slug;
        if (safeDefault) {
          const active = listWrap.querySelector(`[data-slug="${CSS.escape(safeDefault)}"]`);
          if (active) {
            listWrap.querySelectorAll(".entry").forEach((node) => node.classList.remove("is-active"));
            active.classList.add("is-active");
            const payload = entries.find((item) => item.slug === safeDefault);
            renderConversation(payload);
          }
        }

        listWrap.querySelectorAll(".entry").forEach((node) => {
          node.addEventListener("click", async (event) => {
            event.preventDefault();
            const target = node.getAttribute("data-slug");
            listWrap.querySelectorAll(".entry").forEach((item) => item.classList.remove("is-active"));
            node.classList.add("is-active");
            try {
              const conv = entries.find((item) => item.slug === target);
              renderConversation(conv || (await loadConversation(target)));
            } catch {
              messageNode.innerHTML = `<p class="subhead">No conversation available for this slug.</p>`;
            }
          });
        });
      }

      renderList().catch(() => {
        listStatus.textContent = "";
        listWrap.innerHTML = `<p class="meta">No local debate files found in <code>debate/</code>.</p>`;
        messageNode.innerHTML = `<p class="subhead">No data to display.</p>`;
      });

      listToggle.addEventListener("click", () => {
        const isCollapsed = listWrap.classList.toggle("collapsed");
        listToggle.setAttribute("aria-expanded", String(!isCollapsed));
        listToggle.textContent = isCollapsed ? "Show" : "Hide";
      });

      window.addEventListener("hashchange", () => {
        const slug = (location.hash || "").replace("#", "");
        const target = listWrap.querySelector(`[data-slug="${CSS.escape(slug)}"]`);
        if (target) {
          target.click();
        }
      });
    </script>
  </body>
</html>
