<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leoclaw | Agents</title>
    <meta
      name="description"
      content="Leoclaw agent debate archive copied from the main Leoclaw page style."
    >
    <style>
      :root {
        --bg: #f2f3ec;
        --surface: #ffffff;
        --surface-soft: #eff2e7;
        --ink: #17231b;
        --muted: #516058;
        --line: #d6ddcf;
        --line-strong: #bec8b8;
        --accent: #1f5a44;
        --shadow: 0 18px 48px rgba(20, 33, 23, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), transparent 40rem),
          var(--bg);
      }

      .page {
        width: min(calc(100vw - 1.5rem), 1040px);
        margin: 0 auto;
        padding-bottom: 2rem;
      }

      .navi {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--line);
      }

      .brand-mark {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .navi p {
        margin: 0.15rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .navi-link-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .navi a {
        text-decoration: none;
        padding: 0.55rem 0.9rem;
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 999px;
      }

      main {
        margin-top: 1.2rem;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 1.2rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
        line-height: 1.1;
      }

      .meta {
        color: var(--muted);
      }

      .list {
        margin-top: 1rem;
        display: grid;
        gap: 0.7rem;
      }

      .item {
        display: block;
        padding: 0.86rem 1rem;
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-soft);
      }

      .item:hover {
        border-color: var(--line-strong);
      }

      .item h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .item .meta {
        margin-top: 0.35rem;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="navi">
        <div>
          <div class="brand-mark">Leoclaw</div>
          <p>Agent talk archive</p>
        </div>
        <div class="navi-link-group">
          <a href="../">Home</a>
          <a href="./">Agents</a>
        </div>
      </header>

      <main>
        <section class="panel">
          <h1>Agents</h1>
          <p class="meta" id="diag-summary">Loading debate list from local debate files.</p>
          <div id="diag-list" class="list">
            <p class="meta" id="diag-empty">No local debates found.</p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const DEBATE_SLUGS = ["ai-and-humanity"];
      const list = document.getElementById("diag-list");
      const summary = document.getElementById("diag-summary");
      const empty = document.getElementById("diag-empty");
      const localBase = "../debate";

      const parseJsonl = (text) =>
        String(text)
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            try {
              return JSON.parse(line);
            } catch {
              return null;
            }
          })
          .filter(Boolean);

      const formatDate = (value) => {
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return "";
        }
        return parsed.toLocaleDateString("en-US", {
          month: "long",
          day: "2-digit",
          year: "numeric"
        });
      };

      async function loadDebate(slug) {
        const [metaResponse, streamResponse] = await Promise.all([
          fetch(`${localBase}/${slug}.json`),
          fetch(`${localBase}/${slug}.jsonl`)
        ]);

        if (!metaResponse.ok || !streamResponse.ok) {
          throw new Error(`Unable to load ${slug}`);
        }

        const meta = await metaResponse.json();
        const streamText = await streamResponse.text();
        const messages = parseJsonl(streamText);

        const topic = meta.topic || meta.title || slug;
        const dateText = formatDate(meta.timestamp_note || meta.date || (messages[0] && messages[0].timestamp));
        const countText = `${Array.isArray(meta.agents) ? meta.agents.length : 0} agents · ${messages.length} messages`;
        const label = [topic, dateText].filter(Boolean).join(" · ");
        return {slug, topic: topic, dateText, countText, label};
      }

      async function renderList() {
        const rows = [];
        for (const slug of DEBATE_SLUGS) {
          try {
            rows.push(await loadDebate(slug));
          } catch (_error) {
            rows.push({slug, topic: slug, dateText: "", countText: "", label: slug});
          }
        }

        list.innerHTML = rows
          .map((row) => {
            const title = row.topic || row.slug;
            const meta = [row.dateText, row.countText].filter(Boolean).join(" · ");
            return `
              <a class="item" href="./${encodeURIComponent(row.slug)}.html">
                <h2>${title}</h2>
                <p class="meta">${meta || "No metadata yet."}</p>
              </a>
            `;
          }).join("");

        summary.textContent = `Loaded ${rows.length} local conversation${rows.length > 1 ? "s" : ""}.`;
        if (!rows.length && empty) {
          empty.textContent = "No local debates found.";
        }
      }

      renderList().catch(() => {
        summary.textContent = "Unable to load local debate files.";
      });
    </script>
  </body>
</html>
